name: CI/CD — Build, Test, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPO:   635863384351.dkr.ecr.us-east-1.amazonaws.com/fmcc-fraud-detection
  IMAGE_TAG:  ${{ github.sha }}

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  # ── 2. Build & push Docker image to ECR ─────────────────────────────────────
  build-push:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull model artifact from S3
        run: |
          mkdir -p models
          aws s3 cp s3://fmcc-fraud-results-635863384351/models/latest.pkl models/latest.pkl

      - name: Build and push Docker image
        run: |
          docker build \
            --tag ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.ECR_REPO }}:latest \
            .
          docker push ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REPO }}:latest

  # ── 3. Deploy to EC2 via SSH ─────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/fmcc-key.pem
          chmod 600 /tmp/fmcc-key.pem

          ssh -i /tmp/fmcc-key.pem \
            -o StrictHostKeyChecking=no \
            ec2-user@54.227.238.65 << 'ENDSSH'
            # Login to ECR
            aws ecr get-login-password --region us-east-1 \
              | docker login --username AWS --password-stdin \
                635863384351.dkr.ecr.us-east-1.amazonaws.com

            # Pull latest image
            docker pull 635863384351.dkr.ecr.us-east-1.amazonaws.com/fmcc-fraud-detection:latest

            # Restart container with new image
            docker stop fmcc-api || true
            docker rm   fmcc-api || true
            docker run -d \
              --name fmcc-api \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DB_HOST=172.31.18.63 \
              -e MLFLOW_TRACKING_URI=http://172.31.18.63:5001 \
              635863384351.dkr.ecr.us-east-1.amazonaws.com/fmcc-fraud-detection:latest

            # Health check
            sleep 8
            curl -sf http://localhost:8000/health || exit 1
            echo "Deploy successful"
          ENDSSH

      - name: Smoke test API Gateway
        run: |
          sleep 5
          curl -sf https://sracq18y9l.execute-api.us-east-1.amazonaws.com/prod/health \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['model_loaded'], 'Model not loaded'"
          echo "Smoke test passed"
