name: CI/CD — Build, Test, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  ECR_REPO:     ${{ secrets.ECR_REPOSITORY }}
  EC2_HOST:     ${{ secrets.EC2_HOST }}
  IMAGE_TAG:    ${{ github.sha }}

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Run unit tests
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ── 2. Build & push Docker image to ECR ────────────────────────────────────
  build-push:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull model artifact from S3
        run: |
          mkdir -p models
          aws s3 cp s3://fmcc-artifacts/models/latest.pkl models/latest.pkl

      - name: Build Docker image
        run: |
          docker build \
            --tag $ECR_REPO:$IMAGE_TAG \
            --tag $ECR_REPO:latest \
            --label "git.sha=$IMAGE_TAG" \
            --label "built.at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Push to ECR
        run: |
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

      - name: Output image URI
        run: echo "::notice::Image pushed → $ECR_REPO:$IMAGE_TAG"

  # ── 3. Zero-downtime deploy to EC2 ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy via SSM (no SSH key needed)
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=fmcc-prod-api" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REPO }}',
              'docker pull ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}',
              'docker tag ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} ${{ env.ECR_REPO }}:latest',
              'systemctl restart fmcc-api',
              'sleep 10',
              'curl -sf http://localhost:8000/health || exit 1'
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for completion
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StatusDetails" --output text)

          echo "Deploy status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1

      - name: Smoke test public endpoint
        run: |
          sleep 5
          curl -sf "${{ secrets.API_GATEWAY_URL }}/health" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['model_loaded'], 'Model not loaded!'"
          echo "Smoke test passed."

  # ── 4. Terraform plan on PR ─────────────────────────────────────────────────
  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -var="alert_email=alerts@example.com" -var="db_password=placeholder" -no-color
        continue-on-error: true
